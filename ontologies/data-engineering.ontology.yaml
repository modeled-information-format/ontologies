---
# Data Engineering Ontology
#
# A research-oriented ontology for the data engineering domain: data contracts,
# data products, governance, data quality, storage architecture, pipelines, and
# the platforms/tools the field runs on.
#
# Shared engineering supertypes (technology, design-pattern, architectural-decision,
# delivery-metric, engineering-practice, process-discipline) are inherited from the
# engineering-base layer this pack EXTENDS / the generic core — no longer copied here.
#
# Version: 0.2.0
# Last Updated: 2026-06-24
#
# 0.2.0 (ontology-spine-relayering): re-parented onto engineering-base; shed the copied
# shared supertypes (now inherited), the generic `technology` (mif-generic),
# `compliance-regulation` (-> regulatory-legal), the security types (-> software-security),
# and the deprecated `adoption-trend` (-> trend-analysis `trend`). Only data-specific
# types remain. Clean break — no back-compat aliases (pre-stable).

ontology:
  id: data-engineering
  version: "0.4.0"
  description: "Data engineering domain ontology"
  extends:
    - engineering-base

# Custom Namespaces
namespaces:
  semantic:
    children:
      contracts:
        description: "Data contracts and product interface agreements"
        type_hint: semantic
      governance:
        description: "Governance policies, controls, and stewardship"
        type_hint: semantic
      storage:
        description: "Storage and scaling architectures"
        type_hint: semantic
  procedural:
    children:
      pipelines:
        description: "Pipeline and data-movement patterns"
        type_hint: procedural

# Entity Types — data-specific (shared engineering supertypes inherited from engineering-base).
entity_types:
  - name: data-contract
    description: "A data contract: an enforceable agreement on schema, semantics, and SLAs between data producers and consumers"
    aliases:
      - "data contract specification"
      - "schema contract"
      - "data contract policy"
      - "interface contract"
      - "data agreement"
    exemplars:
      - "A contract-native data-contract specification enforces a required root-level field set validated as a pre-merge continuous-integration gate"
      - "A streaming-native data contract enumerates a fixed set of schema-compatibility modes and a fixed set of message-direction actions"
      - "A stewardship-overlay data contract adds an approval-state and ownership fields not present in purely technical enforcement contracts"
    negative_examples:
      - "Defines who is authorized to notify external parties, customers, regulators, downstream consumers, about a data incident, on what timeline and through what channel, so an incident isn't announced externally by whoever happens to be on call without coordinating with legal or compliance; it distinguishes an internally-contained quality problem from one involving exposure of personal data, where a regulatory notification clock may apply regardless of internal preference. Separately, a rule requiring approval from someone other than the author before a change altering a shared table's structure can merge, typically enforced as a required-reviewer rule scoped to specific file paths rather than left to voluntary practice."
      - "A small cross-functional group spanning platform, security, and a sample of consuming teams reviews any new or materially changed agreement before the underlying product is published, checking that its scope and terms line up with organizational governance rather than leaving each domain team to interpret governance requirements on its own, common in organizations where domain teams publish products independently but still want a minimal cross-domain check on anything genuinely new. Separately, querying an automated lineage catalog for every known downstream table, dashboard, and feature depending on a table before a structural change to it ships, turning what would otherwise be a manual, memory-dependent notification step into a query against a maintained graph, though this only catches what the catalog itself has managed to keep complete."
      - "A platform team chose to accept semi-structured source data into a lake's raw zone without enforcing a fixed structure at write time, deferring that definition to the query and transform layer instead, in order to avoid blocking ingestion whenever an upstream source added or changed fields unpredictably, accepting that raw-zone structure would only be discovered at query time, and mitigating that by enforcing stricter structure further downstream once the data reached later, more curated layers."
      - "Contract-first development is an engineering practice where data structure and interface contracts are defined before implementation, ensuring producer and consumer teams agree on schema before either writes code."
      - "The Confluent Schema Registry is a platform service that stores, versions, and serves Avro/Protobuf schemas for Kafka topics, enabling consumers to deserialize messages correctly across schema evolution."
      - "ING's federated data mesh governance implements data contracts between domain teams where each domain publishes its data products with SLAs and versioned schemas, discoverable through a federated catalog."
    base: semantic
    traits:
      - cited
    schema:
      required:
        - name
      properties:
        name:
          type: string
          description: "Contract name or subject"
        scope:
          type: string
          description: "What the contract covers (dataset, interface, domain)"
        parties:
          type: string
          description: "Producer and consumer parties bound by the contract"
        enforcement:
          type: string
          description: "How the contract is enforced (CI gate, registry, runtime check)"
  - name: data-product
    description: "A data product: a discoverable, governed, consumable data asset with an owner and interface"
    aliases:
      - "data product"
      - "data mesh product"
      - "data-as-a-product asset"
      - "productized dataset"
    exemplars:
      - "An internal data-mesh project matured into a commercial cloud-native data marketplace serving institutional customers"
      - "A data mesh spanning many domains and hundreds of data products documented tens of millions in business benefit"
      - "A financial-technology company treats data as a product across several consumer-facing brands serving a large customer base"
    base: semantic
    traits:
      - cited
    schema:
      required:
        - name
      properties:
        name:
          type: string
          description: "Data product name"
        domain:
          type: string
          description: "Owning business domain"
        interface:
          type: string
          description: "Consumption interface (view, table, API, share)"
        sla:
          type: string
          description: "Service-level agreement (freshness, availability)"
  - name: data-governance-policy
    description: "A governance policy or control: a rule governing access, retention, classification, or stewardship of data"
    aliases:
      - "access control policy"
      - "retention policy"
      - "data classification"
      - "masking policy"
      - "stewardship policy"
      - "tagging policy"
    exemplars:
      - "Row filters and column masks evaluated at query time via governed tags"
      - "Tiered storage lifecycle rules with regulation-aligned multi-year retention bands"
      - "A three-tier classification of sensitive records applied at the column level"
      - "Required at-birth documentation and ownership tags that hard-fail the build when missing"
    negative_examples:
      - "Requires that data classified as subject to a residency obligation, such as personal data under cross-border transfer restrictions, is stored and processed only in warehouse or cloud regions within the permitted jurisdiction, enforced through region-scoped storage configuration and, where supported, mechanisms that reject attempts to replicate or export the data outside that region. Enforcing it depends on tracking a residency classification per dataset rather than applying one blanket rule across an entire warehouse, since different datasets in the same environment can fall under different jurisdictions' requirements."
      - "Saxo Bank implemented a data mesh where each business domain (e.g., trading, risk) manages and publishes its data product with documented ownership, quality standards, and access controls."
    base: semantic
    traits:
      - cited
    schema:
      required:
        - policy_name
      properties:
        policy_name:
          type: string
          description: "Policy or control name"
        scope:
          type: string
          description: "What the policy governs (catalog, schema, table, tag)"
        control:
          type: string
          description: "Control type (preventive, detective, corrective)"
        enforcement:
          type: string
          description: "Mechanism that enforces the policy"
  - name: data-quality-rule
    description: "A data quality rule, check, or assertion applied to data to detect or prevent defects"
    aliases:
      - "data quality check"
      - "validation rule"
      - "data quality assertion"
      - "quality gate rule"
      - "data integrity rule"
    exemplars:
      - "A sync-lag failure mode where a record exists in one system but is missing in a downstream system is already encoded as a test scenario"
      - "A reconciliation service level objective sets maximum freshness lag between two systems and a minimum availability percentage"
      - "A regression-test matrix for identity data covers several already-implemented failure scenarios plus gaps identified from real incidents"
    negative_examples:
      - "The average elapsed time between a quality regression actually occurring, say a silent upstream change breaking a downstream aggregate, and the team first becoming aware of it, whether via an automated alert or a consumer complaint, tracked separately from recovery time because detection and recovery respond to different kinds of investment. Separately, a single rolled-up percentage that aggregates pass/fail results across many individual checks into one weighted number, so a failure on a rule marked critical moves it more than a failure on a low-severity one, giving stakeholders one trackable figure to alert on instead of inspecting every check's status individually."
      - "Maintaining a small, hand-curated dataset with manually verified expected outputs and running transformation logic against it on every change, comparing actual results to the known-good output rather than relying only on generic assertions against production-scale data, catching regressions that produce plausible-looking but subtly wrong values, at the cost of keeping the expected outputs maintained as logic evolves. Separately, moving validation as early as possible in a workflow, ideally right at ingestion or the raw-to-staging boundary, rather than only at the final consumer-facing table, so a defect can be traced to its source before propagating through several downstream steps."
    base: semantic
    traits:
      - cited
    schema:
      required:
        - rule_name
      properties:
        rule_name:
          type: string
          description: "Rule or check name"
        dimension:
          type: string
          description: "Quality dimension (freshness, completeness, validity, uniqueness, drift)"
        check:
          type: string
          description: "How the check is expressed or computed"
        action:
          type: string
          description: "Reaction on violation (drop, mark, quarantine, alert, fail)"
  - name: storage-architecture
    description: "A storage or scaling architecture for data (e.g. Postgres sharding, Snowflake multi-tenant isolation, lakehouse table format)"
    aliases:
      - "data storage architecture"
      - "database architecture"
      - "storage topology"
      - "data platform architecture"
      - "storage design"
    exemplars:
      - "A tier-based provisioning scheme encodes isolation level, compute sizing, and clone strategy per tenant tier in one declarative source"
      - "Multiple overlapping identity stores are joined by sync processes with no single declared system of record per attribute"
      - "A dual-path staging design splits an old and new export path, both required to remain consistent to prevent data-quality errors"
      - "Self-managed clustered database high availability requires explicit replication and failover configuration a managed cloud service would otherwise automate"
    negative_examples:
      - "A persistence strategy and technology stack (e.g., Delta Lake for time-travel queries, or tiered storage with hot/cold data separation) chosen to meet performance and cost goals."
      - "A bring-your-own-key (BYOK) encryption policy requires that sensitive data be encrypted with customer-provided keys rather than service-managed keys, with key material never stored on the provider's infrastructure."
      - "Snowflake's secure data sharing feature provides a data contract between provider and consumer where data stays in the provider's account but is accessible to authorized consumers with agreed-upon data governance terms."
    base: semantic
    traits:
      - cited
    schema:
      required:
        - name
      properties:
        name:
          type: string
          description: "Architecture name"
        pattern:
          type: string
          description: "The structural pattern (proxy, extension, shared/isolated, branching)"
        scaling_model:
          type: string
          description: "How it scales (sharding, read replicas, serverless, multi-cluster)"
        tradeoffs:
          type: string
          description: "Key trade-offs and constraints"
  - name: pipeline-pattern
    description: "A pipeline or data-movement pattern (e.g. ETL/ELT, streaming, write-audit-publish, reverse-ETL)"
    aliases:
      - "data pipeline pattern"
      - "pipeline architecture"
      - "ingestion pattern"
      - "data-flow pattern"
      - "processing pipeline"
    exemplars:
      - "A five-stage ingest-profile-validate-observe-remediate pipeline is the interlock spine every other enforcement pattern maps onto"
      - "Contract-native enforcement places the quality gate at pre-merge continuous integration using a declarative data contract"
      - "Streaming-native enforcement stages writes on an audit branch and only publishes them after data-quality checks pass"
      - "Stewardship-overlay enforcement routes proposed schema or contract changes through a human steward's approval before they take effect"
    negative_examples:
      - "Isolating a noisy or unreliable source's ingestion job onto its own dedicated compute pool, rather than a pool shared with unrelated pipelines, so a runaway job processing one source can't starve or delay others on the same orchestrator. Separately, splitting one dataset into per-partition tasks that run independently in parallel before joining their results back into a single downstream step, with the orchestrator generating a variable number of parallel task instances at runtime based on how many partitions are actually discovered, rather than hard-coding a fixed count into the workflow."
      - "A sequence of interdependent ETL stages where output from one component (e.g., a Spark transformer) feeds directly as input to the next, orchestrated by a scheduler."
      - "The gap between the current time and the timestamp of the most recently landed data in a table, tracked continuously against a defined staleness threshold rather than only checked at completion, since a run can finish on schedule while still landing data that's stale relative to its source, often the first number a platform team formalizes because it's the failure most visible to downstream dashboard viewers. Separately, the average elapsed time between a run failing and that same workflow next producing correct output again, whether through automatic retry, manual rerun, or a backfill, tracked apart from how long it takes to notice the failure in the first place."
      - "Facing source-database load spikes and next-day-stale dashboards from nightly batch extraction, a team replaced it with continuous change-data-capture streaming into a message broker, reasoning that reading the transaction log imposes far less load on the source than repeated batch queries, accepting the added operational burden of running and monitoring the streaming connectors once downstream freshness needs tightened past a nightly window. Separately, a team moving to a cloud warehouse chose to load raw source data first and do all transformation afterward with SQL inside the warehouse itself, judging that its elastic compute made a dedicated transform layer redundant, and accepted the ongoing storage cost of an untransformed copy in exchange for being able to fix and rerun a transformation bug without re-extracting from the source system."
      - "A gate a new workflow must pass before it's allowed to run against production sources or publish to production-consumed tables, checking for things like a defined test suite, a named on-call owner, documented freshness targets, and a rollback procedure, adapted from general software launch-readiness review to this domain's specific risks, with teams commonly blocking on at least one check per output table and a named rotation, since an unowned, untested pipeline is the most common root cause cited in postmortems. Separately, a rotating engineer serving as first responder for run failures and freshness or quality alerts, with a defined escalation path to the owning team when the issue can't be resolved in a target window, typically documented in its own runbook set even when the paging tool is shared with application on-call."
      - "Analytics engineering is an engineering practice where data engineers build transformations and models that prepare raw data for consumption by analysts and business intelligence tools, treating data as a product."
      - "Apache Atlas with Hive lineage tracking records the provenance of data assets as they flow through transformations, allowing analysts to trace back why a metric has a particular value to the source systems that populated it."
      - "Apache Airflow is a data orchestration platform that schedules and monitors workflows, Kafka is a streaming platform for event ingestion, and Fivetran is a managed ELT platform - each provides infrastructure for moving data, not just a single pattern."
      - "Segment's Protocols is a tracking plan system where event schemas and required fields are defined centrally, creating a contract between the analytics library and the backend about what data will be sent."
    base: procedural
    traits:
      - cited
    schema:
      required:
        - pattern_name
      properties:
        pattern_name:
          type: string
          description: "Pattern name"
        context:
          type: string
          description: "When to use this pattern"
        solution:
          type: string
          description: "How the pattern moves or validates data"
  - name: data-platform
    description: "A named data platform, tool, catalog, or engine (e.g. Snowflake, Postgres, dbt, Airflow, Kafka, Iceberg, Unity Catalog)"
    aliases:
      - "data warehouse"
      - "data catalog"
      - "data quality tool"
      - "lakehouse engine"
      - "streaming platform"
      - "data tooling"
    exemplars:
      - "An open-source data quality framework with declarative check definitions"
      - "A cloud data warehouse feature reaching general availability with native test integration"
      - "A catalog offering branch-like transactional versioning across multiple tables"
      - "A contract validation tool that emits pipeline annotations and diffs versions for breaking changes"
    negative_examples:
      - "A single Docker-packaged implementation of a fixed sync protocol for one source or destination system, exposing only a small set of uniform operations that the calling platform invokes the same way regardless of what system is on the other end. Separately, a single server process in a cluster responsible for storing a subset of each topic's partitions on local disk, serving produce and fetch requests for the partitions it leads, and replicating that data to follower processes for durability, with cluster metadata about who leads which partition coordinated through a controller quorum or an external coordination ensemble."
      - "Citing correctness problems under concurrent writers and readers at petabyte scale, partial writes and inconsistent directory listings that the older table-tracking model couldn't reliably prevent, a large-scale data platform team moved its lake tables to a newer, snapshot-based metadata format. They accepted the cost of migrating existing tables and retraining engineers on the new metadata and branching model in exchange for atomic commits, safe schema and partition evolution, and time travel the previous format lacked."
      - "Unity Catalog's automatic lineage feature traces data transformations across tables, capturing which source datasets feed into derived datasets and making that lineage queryable for impact analysis."
      - "Airbnb's Minerva is a centralized metrics layer where metric definitions (like gross booking value) are authored once against governed tables and then automatically materialized for consumption by dashboards and analysis tools."
      - "Apache Iceberg is a table format (not a platform) that adds ACID semantics and time-travel queries to data lakes, enabling efficient schema evolution and partition evolution without rewriting table data."
    base: semantic
    traits:
      - cited
    schema:
      required:
        - name
        - category
      properties:
        name:
          type: string
          description: "Platform or tool name"
        category:
          type: string
          description: "Free-form category (warehouse, catalog, observability, streaming, proxy, table-format, transformation, etc.)"
        vendor:
          type: string
          description: "Maintaining vendor or project"
        use_case:
          type: string
          description: "Primary role in the data stack"

# Traits (Mixins)
traits:
  cited:
    description: "Requires citations/sources"
    requires:
      - citations

# Relationships
relationships:
  enforces:
    description: "A governance policy or contract enforces a quality rule"
    from:
      - data-governance-policy
      - data-contract
    to:
      - data-quality-rule
    symmetric: false
  governs:
    description: "A policy or platform governs a data product or architecture"
    from:
      - data-governance-policy
      - data-platform
    to:
      - data-product
      - storage-architecture
    symmetric: false
  implements:
    description: "A platform or architecture implements a pattern or decision"
    from:
      - data-platform
      - storage-architecture
    to:
      - pipeline-pattern
      - design-pattern
      - architectural-decision
    symmetric: false
  # Cross-branch: a data product/architecture is governed by an engineering-base
  # control or policy (the data-governance / security cross-cut the corpus surfaced —
  # tag-driven ABAC, policy-as-code on data assets). Endpoints in the ancestor layer
  # resolve via the extends chain.
  governed_by:
    description: "A data product or storage architecture is governed by a control or policy"
    from:
      - data-product
      - storage-architecture
    to:
      - control
      - policy
    symmetric: false

# Discovery Configuration
discovery:
  enabled: true
  confidence_threshold: 0.8
  patterns:
    - content_pattern: "\\b(Snowflake|Postgres|PostgreSQL|BigQuery|Redshift)\\b"
      suggest_entity: data-platform
      suggest_namespace: _semantic/entities
    - content_pattern: "\\b(dbt|Airflow|Kafka|Iceberg|Delta\\s+Lake|Unity\\s+Catalog|Polaris)\\b"
      suggest_entity: data-platform
      suggest_namespace: _semantic/entities
    - content_pattern: "\\b(write-audit-publish|WAP|reverse-ETL|ELT|ETL)\\b"
      suggest_entity: pipeline-pattern
      suggest_namespace: _procedural/patterns
