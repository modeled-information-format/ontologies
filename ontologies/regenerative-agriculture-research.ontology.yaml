    subtype_of:
      - husbandry-practice
    traits:
      - cited
    schema:
      required:
        - practice_name
      properties:
        practice_name:
          type: string
          description: "Name of the neonatal-care protocol"
        species:
          type: string
          description: "Target species"
        time_window:
