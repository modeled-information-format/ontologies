---
# Observability Ontology
#
# Domain pack for observability-platform research. Types form an explicit IS-A tree
# (subtype_of) rooted in the inherited generic/engineering supertypes, so the hierarchy
# is generic -> intermediate -> leaf, e.g.:
#
#   technology (mif-generic)      -> observability-resource   -> observability-service
#   technology (mif-generic)      -> observability-resource   -> service-ownership-registry
#   concept    (mif-generic)      -> observability-assessment -> capability-comparison
#   concept    (mif-generic)      -> observability-assessment -> market-position
#   concept    (mif-generic)      -> observability-assessment -> roadmap-signal
#   delivery-metric (engineering-base)                        -> telemetry-signal
#   design-pattern  (engineering-base)                        -> migration-pattern
#
# Extends BOTH engineering-base (component, delivery-metric, design-pattern, …) and
# mif-generic (technology, concept, organization) so every subtype_of / relationship
# endpoint resolves through the extends chain at concordance time.
#
# Version: 0.1.0
# Last Updated: 2026-06-26

ontology:
  id: observability
  version: "0.4.0"
  description: "Observability-platform domain ontology — services, telemetry signals, capability comparisons, service-ownership registries, migration patterns, market positioning, and roadmap signals, organized as an IS-A tree rooted in generic types"
  schema_url: >-
    https://mif-spec.dev/schema/ontology/ontology.schema.json
  extends:
    - engineering-base
    - mif-generic

# Namespace Hierarchy (Cognitive Triad)
namespaces:
  _semantic:
    description: "Facts, concepts, comparisons"
    type_hint: semantic
    children:
      services:
        description: "Observability services and the signals/registries they provide"
        type_hint: semantic
      analysis:
        description: "Capability comparisons and market positioning"
        type_hint: semantic
  _episodic:
    description: "Time-stamped product and roadmap signals"
    type_hint: episodic
    children:
      roadmap:
        description: "GA dates, launches, deprecations, predictions"
        type_hint: episodic
  _procedural:
    description: "Migration approaches and patterns"
    type_hint: procedural
    children:
      migrations:
        description: "Datadog-to-AWS-native migration patterns and case studies"
        type_hint: procedural

# Entity Types — abstract intermediate supertypes first, then concrete leaves.
entity_types:
  # ----- Abstract intermediate supertypes (the "x" layer; not stamped on findings) -----
  - name: observability-resource
    description: "Abstract supertype: a deployable observability capability/system (specializes the generic technology)"
    base: semantic
    abstract: true
    subtype_of:
      - technology
    schema:
      required:
        - name
      properties:
        name:
          type: string
  - name: observability-assessment
    description: "Abstract supertype: an analytical judgment about observability (specializes the generic concept)"
    base: semantic
    abstract: true
    subtype_of:
      - concept
    schema:
      required:
        - name
      properties:
        name:
          type: string

  # ----- Concrete leaf types -----
  - name: observability-service
    description: "An observability service or product (CloudWatch, X-Ray, ADOT, Amazon Managed Prometheus/Grafana, Datadog) and the pillars it serves"
    negative_examples:
      - "This decision record explains why the organization is standardizing on a single vendor-neutral instrumentation or log-backend choice, citing cost-of-query-pattern or vendor-lock-in rationale, and names the migration cost accepted as a consequence of the switch."
      - "A narrowly-scoped piece of a larger observability stack that performs exactly one function relative to a neighboring piece, for example converting Kubernetes object state into metrics without reporting live resource usage itself, or only deduplicating and routing alerts that another process already evaluated."
      - "Amazon Managed Grafana and Grafana Cloud run the identical open-source Grafana engine with the same plugin and data-source model, so dashboards and alert rules built on one transfer largely unmodified to the other, a genuine parity case, since both are the same upstream project operated by different vendors. The real difference is scope rather than capability: Grafana Cloud bundles managed Loki, Tempo, and Mimir as backing data stores behind the same dashboards, while Amazon Managed Grafana is visualization-only and expects to query AWS-native or self-hosted stores instead. A similar comparison holds one level down the stack: Amazon Managed Service for Prometheus matches self-hosted Prometheus exactly on query language and data model, so existing exporters and dashboards need no rewrite, but is judged superior on operational overhead, horizontal query scaling, long retention, and high-availability ingestion are absorbed by the managed service instead of requiring a team to run its own federation or Thanos/Cortex layer."
      - "Prometheus Remote Write 2.0 is a substantial protocol revision adding native exemplar and histogram support along with out-of-order sample handling and a more compact wire encoding; managed backends track adoption of the new protocol version as an explicit roadmap dependency, since a backend still speaking only 1.0 can't ingest the newer sample types until it ships 2.0 support. On a similar timeline, an APM capability positioned to automatically instrument applications and derive SLOs from existing trace data was announced in preview at a re:Invent keynote in late 2023 and spent roughly seven months in preview, expanding automatic-instrumentation coverage to additional language runtimes based on customer feedback, before reaching general availability."
      - "Prometheus Remote Write is the protocol a Prometheus server or compatible agent uses to continuously ship ingested samples to a remote long-term storage backend, the shared mechanism underlying every managed-Prometheus-compatible offering rather than each backend inventing its own ingestion protocol. Querying that data typically happens through PromQL, a language purpose-built for time series with first-class operators for rate-of-change over a counter, aggregation across label dimensions, and range-vector selection over a historical window, distinct from a general-purpose language like SQL retrofitted onto time-series data, and its adoption well beyond Prometheus itself has made it a de facto standard for metrics querying independent of which backend actually stores the samples."
      - "Elastic was named a Leader in Gartner's 2025 Magic Quadrant for Observability Platforms for a second straight year, per the company's own summary of the report, credited to Elasticsearch and Kibana's roots as a search and log-analytics engine that has since been extended into full observability, metrics, APM, and now vector-search-based AI features, rather than a platform built metrics-first from the ground up. This positioning is what distinguishes the vendor from purpose-built APM-first competitors: its observability offering is simply one deployment mode of the same underlying cluster technology a customer might already be running for search or security workloads."
      - "Because Amazon Managed Service for Prometheus speaks the standard remote_write protocol and serves standard PromQL, the documented path off a self-hosted Prometheus federation or Thanos/Cortex setup looks closer to a configuration change than a re-instrumentation project: existing exporters and recording rules require no modification, only repointing the remote_write target and adding IAM SigV4 request signing. Teams typically make this move because they want to stop operating the federation or long-term-storage layer themselves, not because of any incompatibility at the query or scrape layer."
      - "The CNCF, under the Linux Foundation, is the vendor-neutral home for a large share of the open-source observability ecosystem's projects, Prometheus and Jaeger among its graduated projects, OpenTelemetry still incubating, Fluentd and Fluent Bit also graduated, providing shared governance and trademark stewardship so no single project is controlled by a vendor with a commercial stake in its direction. Its annual survey, conducted jointly with the Linux Foundation, is commonly cited as a data source on real-world observability tool adoption, distinct from any individual vendor's self-reported customer figures."
      - "Vizceral is a WebGL-based traffic-visualization tool Netflix built internally and open-sourced in 2016, rendering live request-volume between services as an animated node-and-edge graph at three zoom levels, global regional traffic, service-to-service within a region, and individual service detail. Netflix called the goal 'intuition engineering': giving an on-call engineer an at-a-glance visual read of where traffic is flowing abnormally, a region going dark or an edge turning red with errors, faster than scanning a set of discrete dashboards, at the cost of not functioning as a general-purpose metrics or alerting tool on its own."
      - "Service observability platforms automatically collect request-level metrics capturing latency percentiles, error rates, and throughput across all application endpoints."
    base: semantic
    subtype_of:
      - observability-resource
    schema:
      required:
        - name
        - provider
        - pillars
      properties:
        name:
          type: string
        provider:
          type: string
          description: "Vendor/platform that ships the service"
          enum:
            - aws
            - datadog
            - grafana
            - other
        pillars:
          type: array
          description: "Observability pillars the service serves"
          items:
            type: string
            enum:
              - metrics
              - logs
              - traces
              - apm
              - rum
              - synthetics
              - dashboards
              - profiling
              - aiops
        maturity:
          type: string
          enum:
            - ga
            - preview
            - maintenance
            - end-of-support
        aws_service_name:
          type: string
          description: "Canonical AWS service name when provider is aws"
  - name: service-ownership-registry
    description: "A service catalog, resource registry, service map, or internal developer portal that tracks service ownership/topology"
    aliases:
      - "service catalog"
      - "ownership registry"
      - "application registry"
      - "developer portal catalog"
    exemplars:
      - "A telemetry-driven service catalog auto-populates ownership metadata from live tracing data rather than requiring manual registration"
      - "A cloud provider's application-registry capability evolved from an API-first tool toward a console-first, more discoverable successor"
      - "No single native service replaces a telemetry-driven service catalog; a composite of several separate registries is required instead"
    negative_examples:
      - "Distributed trace context propagation across service boundaries maintains correlation identity through W3C standard headers and message metadata."
    base: semantic
    subtype_of:
      - observability-resource
    schema:
      required:
        - name
        - registry_kind
      properties:
        name:
          type: string
        registry_kind:
          type: string
          enum:
            - telemetry-catalog
            - resource-registry
            - service-map
            - idp
        provider:
          type: string
        features:
          type: array
          items:
            type: string
  - name: telemetry-signal
    description: "A class of telemetry data (a signal/pillar) produced and consumed across observability services"
    negative_examples:
      - "A correlation ID propagation technique embedded in service calls to track a request across multiple services and correlate logged events to a single logical transaction."
      - "Organizations increasingly govern telemetry through explicit policy rather than ad hoc engineering judgment: one rule assigns sensitivity tiers to the data captured by traces, metrics, and logs, for instance a stricter tier for anything that might carry customer PII, such as session replays or logged request bodies, and dictates the retention, access control, and redaction each tier requires, enforced automatically at ingestion based on source-service metadata rather than left to individual engineers. A companion rule restricts which external observability vendors may receive telemetry leaving the organization's infrastructure at all, and further limits which data classification tiers even an approved vendor may receive; enforcement lives structurally in the exporter configuration of the collection pipeline, and onboarding a new vendor destination requires security and legal sign-off before its export path is permitted."
      - "A decision was made to adopt an eBPF-based, zero-instrumentation monitoring agent so that every service gets a baseline visibility floor immediately, approximate service maps and golden-signal metrics derived purely from kernel-level network observation, rather than leaving newly onboarded or lower-priority services dark until someone manually instruments them. The accepted trade-off is granularity: kernel-derived telemetry is coarser than a manually instrumented trace with business-logic-level spans, so this floor is explicitly scoped as a stopgap rather than a replacement for the manual OpenTelemetry instrumentation still targeted as the eventual end state."
      - "The OpenTelemetry Collector is a standalone binary that sits between instrumented applications and one or more observability backends, accepting incoming trace spans, metric samples, and log lines over protocols like OTLP, Prometheus remote_write, Jaeger, and Zipkin. It applies configurable processing, batching, sampling, attribute filtering, PII redaction, before exporting to one or many destinations at once, so that adding or switching a backend becomes an exporter configuration change on this component rather than a redeploy of every service producing the underlying data."
      - "A control enforces that observability data is retained for a maximum of 90 days before purging, implemented as a data-retention policy applied to all metric backends to balance storage costs against the need to investigate historical incidents."
      - "A telemetry onboarding checklist discipline lists the required steps when adding a new metric or trace to the observability infrastructure, including name/unit definition, dashboard link, alert thresholds, and retention policies."
      - "Alert fatigue is the degraded response an on-call engineer develops after being repeatedly paged by low-signal, non-actionable notifications, not mere annoyance, but a measurable slowdown in noticing and correctly triaging a genuinely urgent page once one finally arrives, a pattern studied extensively in clinical alarm-fatigue research before being adapted to on-call practice. A related conceptual debate concerns how signal types themselves should be framed: the popular 'three pillars' model separating metrics, logs, and traces into distinct stores has drawn pushback from practitioners like Charity Majors, who argue that splitting them into three separately-collected categories is itself a symptom of the underlying tooling problem, proposing instead that high-cardinality structured events are the more foundational unit, with metrics, logs, and traces as merely derivable views over that same data."
      - "The OpenTelemetry Semantic Conventions document specifies the standard attribute names and value formats instrumentation should emit for common concepts, an HTTP request's method and status code, a database call's system and statement text, a Kubernetes pod's namespace and name, so that output from differently-authored instrumentation libraries or different vendors' auto-instrumentation agents lands under consistent field names instead of each library inventing its own. Without this shared reference, a dashboard or query built against one library's naming would silently fail to match telemetry produced by a different library instrumenting the same kind of operation, even where both speak the same underlying wire format."
      - "A widely documented approach to de-risking a move from a proprietary APM agent to OpenTelemetry instrumentation is incremental, service-by-service rollout rather than an organization-wide rewrite, made viable because most commercial APM backends accept OTLP-formatted data directly without requiring the destination to change in lockstep with the instrumentation. The main risk this staged approach guards against is a broken trace: if a request crosses from an already-migrated service into one still running the old agent, and the two disagree on trace-context propagation format, the request fragments into two disconnected traces instead of remaining one continuous one across the call."
      - "The OpenTelemetry Protocol (OTLP) efficiently encodes and transmits metrics, logs, and trace data to backend systems with built-in compression and automatic retry."
    base: semantic
    subtype_of:
      - delivery-metric
    schema:
      required:
        - metric_name
        - signal_type
      properties:
        metric_name:
          type: string
          description: "Renamed from name to match engineering-base.ontology.yaml's delivery-metric field name directly"
        signal_type:
          type: string
          enum:
            - metric
            - log
            - trace
            - rum
            - synthetic
            - profile
            - event
        producers:
          type: array
          items:
            type: string
        backends:
          type: array
          items:
            type: string
  - name: capability-comparison
    description: "A capability or gap comparison between an observability subject and a baseline (e.g. AWS-native vs Datadog for a pillar)"
    aliases:
      - "feature comparison"
      - "capability gap analysis"
      - "vendor capability comparison"
      - "platform comparison"
    exemplars:
      - "A commercial observability platform has no official plugin for a given developer portal, requiring a proxy-based integration workaround instead"
      - "An incumbent monitoring vendor retains capability leads in integrated security and multi-cloud breadth that a challenger has not yet matched"
    negative_examples:
      - "An analysis comparing the strengths and weaknesses of two different architectural approaches (e.g., single-pane-of-glass monitoring vs. best-of-breed tooling per domain) to help stakeholders weigh trade-offs."
      - "A canary analysis pattern detects when a percentage of production traffic is automatically rolled back to the previous version if post-deployment metrics diverge beyond configured thresholds, eliminating manual approval delays for low-risk changes."
      - "An incident severity classification discipline defines distinct severity levels (critical, high, medium, low) based on impact (number of users affected, revenue impact, data loss risk) and provides decision rules for which level different types of issues map to."
      - "A parallel-run cutover strategy shadows all production telemetry through both monitoring systems simultaneously before switching primary collection, minimizing data loss."
    base: semantic
    subtype_of:
      - observability-assessment
    schema:
      required:
        - name
        - subject
        - baseline
        - parity
      properties:
        name:
          type: string
        subject:
          type: string
          description: "The capability under evaluation (e.g. AWS-native APM)"
        baseline:
          type: string
          description: "The comparator it is measured against (e.g. Datadog APM)"
        parity:
          type: string
          enum:
            - parity
            - partial
            - gap
            - superior
        gaps:
          type: array
          items:
            type: string
  - name: market-position
    description: "A vendor's positioning in the observability market per an analyst or market source"
    aliases:
      - "competitive market position"
      - "market standing"
      - "vendor market share"
      - "analyst market ranking"
    exemplars:
      - "An analyst firm's quadrant places an incumbent vendor as a market leader and a cloud-native challenger a tier below"
      - "A discipline has reached near-universal enterprise adoption within a few years, according to an annual research report"
    negative_examples:
      - "Gartner's 2025 Magic Quadrant for Observability Platforms is a published report, released July 2025, that evaluates approximately 20 vendors against defined Ability to Execute and Completeness of Vision criteria."
      - "Gartner is the analyst firm that publishes the annual Magic Quadrant for Observability Platforms, applying a consistent published evaluation methodology across roughly 20 vendors each report cycle."
    base: semantic
    subtype_of:
      - observability-assessment
    schema:
      required:
        - name
        - vendor
      properties:
        name:
          type: string
        vendor:
          type: string
        source:
          type: string
          description: "The market/analyst source (e.g. Gartner Magic Quadrant 2025)"
        placement:
          type: string
          enum:
            - leader
            - challenger
            - visionary
            - niche
            - unranked
  - name: roadmap-signal
    description: "A time-stamped product or roadmap signal: a GA date, launch, deprecation/maintenance move, or near-term prediction"
    aliases:
      - "product roadmap signal"
      - "vendor trajectory signal"
      - "future-direction signal"
      - "platform roadmap indicator"
    exemplars:
      - "A community-governed open-source project's roadmap points toward AI-native tooling as the next integration direction"
      - "Vendor-announced launches over the past year or two indicate which competing platform capabilities are likely to close within that window"
      - "A generative-AI incident-investigation feature reaching general availability signals a broader shift toward AI-driven root-cause analysis"
    negative_examples:
      - "Cardinality growth rate measures the number of distinct values in a time-series metric over time; a rapid growth in cardinality can indicate unbounded tag explosion in an instrumentation library, increasing storage and query costs."
      - "An SLO review cadence discipline schedules quarterly reviews where teams revisit their service-level objectives, adjusting targets based on actual performance trends and changing business priorities."
      - "Splunk is expanding cloud-native deployment options and adding real-time machine-learning-driven anomaly detection to enhance competitive positioning in analytics."
      - "Continuous profiling works by sampling a running process's stack traces at a fixed frequency, rather than the per-request granularity of a trace span, to build a flame graph showing where CPU time or memory allocation is actually being spent, running always-on in production instead of only during a manual profiling session. OpenTelemetry has adopted profiling as a fourth core signal alongside traces, metrics, and logs, entering public alpha with a pprof-compatible data model and eyeing general availability later in its roadmap, though it remains considerably less mature than the other three established signal types."
    base: episodic
    subtype_of:
      - observability-assessment
    schema:
      required:
        - name
        - signal_kind
      properties:
        name:
          type: string
        signal_kind:
          type: string
          enum:
            - ga
            - preview
            - launch
            - maintenance
            - end-of-support
            - prediction
        date:
          type: string
          description: "Signal date (ISO date or month/quarter as published)"
        capability_area:
          type: string
          description: "The pillar/capability the signal advances"
  - name: migration-pattern
    description: "An approach, case study, or community pattern for migrating between observability platforms"
    aliases:
      - "platform migration pattern"
      - "cloud migration pattern"
      - "vendor migration playbook"
      - "transition pattern"
    exemplars:
      - "A phased rollout plan for a new internal platform begins with a small pilot before scaling to organization-wide adoption waves"
      - "Documented real-world migrations from one observability vendor to another report meaningful cost reduction alongside a multi-month timeline"
      - "Automated migration tooling is reducing a historically months-long platform migration down to a matter of weeks"
    negative_examples:
      - "Treating dashboard definitions as version-controlled source code, reviewed via pull request and deployed through the same pipeline as application code, has become an adopted operating practice for teams moving away from ad hoc UI-based dashboard editing, since manual edits leave no change history and don't propagate consistently across many similar per-service dashboards. A related practice, chaos engineering, is increasingly framed not just as a resilience-validation approach but as an observability-validation discipline in its own right: when an injected failure fails to surface on any dashboard or alert, that silence is treated as a first-class finding revealing a monitoring gap, not merely a footnote to the uptime result."
    base: procedural
    subtype_of:
      - design-pattern
    schema:
      required:
        - pattern_name
        - from_platform
        - to_platform
        - context
        - solution
      properties:
        pattern_name:
          type: string
          description: "Renamed from name to match engineering-base.ontology.yaml's design-pattern field name directly"
        from_platform:
          type: string
        to_platform:
          type: string
        context:
          type: string
          description: "Inherited from design-pattern: when to use this migration pattern (genuinely new field, no prior equivalent existed on migration-pattern)"
        solution:
          type: string
          description: "Renamed from approach to match engineering-base.ontology.yaml's design-pattern field name directly (how the pattern accomplishes the migration)"
        evidence_type:
          type: string
          enum:
            - case-study
            - community-pattern
            - vendor-report
            - reference-architecture

# Traits (reusable mixins) — available for future enrichment.
traits:
  sourced:
    description: "Adds a primary-source reference"
    fields:
      source_url:
        type: string
        format: uri
      source_title:
        type: string

# Relationships — observability edges beyond the subtype_of IS-A tree. Endpoints naming
# inherited supertypes (technology, component) resolve via the extends chain.
relationships:
  emits:
    description: "A service produces a telemetry signal"
    from:
      - observability-service
    to:
      - telemetry-signal
    symmetric: false
  compares:
    description: "A comparison evaluates a service/technology against a baseline"
    from:
      - capability-comparison
    to:
      - observability-service
      - technology
    symmetric: false
  positions:
    description: "A market position situates a vendor/technology"
    from:
      - market-position
    to:
      - technology
    symmetric: false
  advances:
    description: "A roadmap signal advances a service's capability"
    from:
      - roadmap-signal
    to:
      - observability-service
    symmetric: false
  catalogs:
    description: "A registry catalogs services/components"
    from:
      - service-ownership-registry
    to:
      - observability-service
      - component
    symmetric: false

# Discovery Patterns
discovery:
  enabled: true
  confidence_threshold: 0.8
  patterns:
    - content_pattern: "\\b(CloudWatch|X-Ray|ADOT|OpenTelemetry|Managed Prometheus|Managed Grafana|Application Signals)\\b"
      suggest_entity: observability-service
      suggest_namespace: _semantic/services
    - content_pattern: "\\b(service catalog|service ownership|AppRegistry|myApplications|developer portal|IDP|service map)\\b"
      suggest_entity: service-ownership-registry
      suggest_namespace: _semantic/services
    - content_pattern: "\\b(parity|capability gap|pillar-by-pillar|vs\\.?\\s+Datadog)\\b"
      suggest_entity: capability-comparison
      suggest_namespace: _semantic/analysis
    - content_pattern: "\\b(migration|migrate)\\b.*\\b(case study|pattern|Datadog)\\b"
      suggest_entity: migration-pattern
      suggest_namespace: _procedural/migrations
    - content_pattern: "\\b(Gartner|Magic Quadrant|market (leader|position)|challenger)\\b"
      suggest_entity: market-position
      suggest_namespace: _semantic/analysis
    - content_pattern: "\\b(GA|generally available|re:Invent|end-of-support|maintenance mode|roadmap)\\b"
      suggest_entity: roadmap-signal
      suggest_namespace: _episodic/roadmap
