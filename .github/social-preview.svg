<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MIF Ontology Corpus — a shared, growing set of ontologies that domains extend">
  <title>Ontology Corpus — built on MIF</title>
  <desc>Dark field. The chevron-M MIF mark and wordmark. Title "Ontology Corpus". Three pillars — base plus shared traits, domain ontologies, two readers one model — beside an inheritance motif: a machine-cyan base (mif-base's knowledge triad and shared-traits mixins) that domain ontologies extend, fanning out as human-amber nodes to the right, the corpus still growing at a dashed "+new" edge.</desc>
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0D13"/>
      <stop offset="1" stop-color="#0E121B"/>
    </linearGradient>
    <radialGradient id="growGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#F5B642" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F5B642" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Field -->
  <rect width="1280" height="640" fill="url(#field)"/>
  <!-- Faint inset frame -->
  <rect x="36" y="36" width="1208" height="568" rx="20" fill="none" stroke="#222C3C" stroke-width="2"/>

  <!-- ===== Identity lockup (top-left): chevron-M mark + wordmark ===== -->
  <g transform="translate(84 66) scale(1.15)" fill="none" stroke-width="4" stroke-linejoin="round" stroke-linecap="round">
    <path d="M6 42 L6 6 L24 29" stroke="#34D3E8"/>
    <path d="M24 29 L42 6 L42 42" stroke="#F5B642"/>
    <path d="M24 25.6 L27.4 29 L24 32.4 L20.6 29 Z" fill="#E8EEF6" stroke="none"/>
  </g>
  <text x="150" y="112" font-family="Menlo, 'SF Mono', 'JetBrains Mono', monospace"
        font-size="30" font-weight="700" letter-spacing="0.04em" fill="#E8EEF6">MIF</text>
  <text x="222" y="112" font-family="Menlo, 'SF Mono', 'JetBrains Mono', monospace"
        font-size="15" fill="#7C8AA0" letter-spacing="0.05em">Modeled Information Format</text>

  <!-- ===== Title block (left column) ===== -->
  <text x="84" y="214" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="60" font-weight="700" letter-spacing="-0.02em" fill="#E8EEF6">Ontology Corpus</text>
  <text x="86" y="254" font-family="Menlo, 'SF Mono', 'JetBrains Mono', monospace"
        font-size="19" fill="#AEBCCF" letter-spacing="0.01em">The shared ontology corpus for MIF.</text>

  <!-- ===== Three pillars ===== -->
  <!-- 1 · Base + shared traits (machine-cyan square = the typed base) -->
  <rect x="86" y="316" width="16" height="16" rx="2" fill="#34D3E8"/>
  <text x="122" y="324" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="600" fill="#E8EEF6">Base + shared traits</text>
  <text x="122" y="350" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="16" fill="#7C8AA0">mif-base's knowledge triad and cross-domain trait mixins.</text>

  <!-- 2 · Domain ontologies (light vertex node = the convergence point) -->
  <path d="M94 398 L100.4 404.4 L94 410.8 L87.6 404.4 Z" fill="#E8EEF6"/>
  <text x="122" y="406" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="600" fill="#E8EEF6">Domain ontologies</text>
  <text x="122" y="432" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="16" fill="#7C8AA0">Thirteen domain ontologies that type memories, security to agriculture.</text>

  <!-- 3 · Two readers, one model (human-amber dot = the meaning a person reads) -->
  <circle cx="94" cy="488" r="9" fill="#F5B642"/>
  <text x="122" y="496" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="600" fill="#E8EEF6">Two readers, one model</text>
  <text x="122" y="522" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="16" fill="#7C8AA0">Each ontology is YAML a person reads and JSON-LD a parser resolves.</text>

  <!-- ===== Inheritance motif (right column): a cyan typed base that domains extend, still growing ===== -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- soft growth glow at the forming (top-right) edge -->
    <circle cx="1040" cy="236" r="78" fill="url(#growGlow)"/>

    <!-- extends edges: from the base hub out to each domain node (the inheritance fan) -->
    <g stroke="#34D3E8" stroke-width="2.5" fill="none" opacity="0.55">
      <path d="M772 340 L1015 212"/>
      <path d="M772 340 L1040 278"/>
      <path d="M772 340 L1050 350"/>
      <path d="M772 340 L1040 422"/>
      <path d="M772 340 L1015 488"/>
    </g>

    <!-- typed waypoint squares along two edges (structure a parser reads) -->
    <g fill="#0A2630" stroke="#34D3E8" stroke-width="2">
      <rect x="894" y="302" width="11" height="11" rx="2" opacity="0.8"
            transform="rotate(-15 899 307)"/>
      <rect x="900" y="376" width="11" height="11" rx="2" opacity="0.8"
            transform="rotate(10 905 381)"/>
    </g>

    <!-- ===== the base: mif-base (typed square) + the knowledge triad + shared-traits ===== -->
    <!-- triad ticks (semantic / episodic / procedural) feeding mif-base -->
    <g fill="#34D3E8">
      <rect x="700" y="300" width="9" height="9" rx="1.5" opacity="0.9"/>
      <rect x="700" y="316" width="9" height="9" rx="1.5" opacity="0.7"/>
      <rect x="700" y="332" width="9" height="9" rx="1.5" opacity="0.55"/>
    </g>
    <g stroke="#2E3A4D" stroke-width="1.5">
      <line x1="709" y1="304.5" x2="740" y2="316"/>
      <line x1="709" y1="320.5" x2="740" y2="320"/>
      <line x1="709" y1="336.5" x2="740" y2="324"/>
    </g>
    <!-- mif-base node -->
    <rect x="740" y="306" width="22" height="22" rx="3" fill="#0A2630" stroke="#34D3E8" stroke-width="2.5"/>
    <!-- shared-traits node (extends mif-base) -->
    <line x1="751" y1="328" x2="751" y2="372" stroke="#34D3E8" stroke-width="2.5" opacity="0.7"/>
    <rect x="740" y="372" width="22" height="22" rx="3" fill="#0A2630" stroke="#34D3E8" stroke-width="2.5"/>

    <!-- ===== domain ontologies: amber = the meaning each domain adds ===== -->
    <circle cx="1040" cy="278" r="9" fill="#F5B642" opacity="0.78"/>
    <circle cx="1050" cy="350" r="9.5" fill="#F5B642"/>
    <circle cx="1040" cy="422" r="9" fill="#F5B642" opacity="0.86"/>
    <circle cx="1015" cy="488" r="8.5" fill="#F5B642" opacity="0.7"/>
    <!-- the live edge — a domain still forming (dashed) = the corpus keeps growing -->
    <circle cx="1015" cy="212" r="9" fill="none" stroke="#F5B642" stroke-width="2.5" stroke-dasharray="3 3"/>
  </g>

  <!-- typed micro-labels: be the example — real names from the corpus, mono, sparse -->
  <g font-family="Menlo, 'SF Mono', 'JetBrains Mono', monospace" letter-spacing="0.02em">
    <g font-size="12.5">
      <text x="734" y="303" text-anchor="end" fill="#AEBCCF">mif-base</text>
      <text x="734" y="390" text-anchor="end" fill="#AEBCCF">shared-traits</text>
      <text x="705" y="289" text-anchor="middle" fill="#7C8AA0">_semantic</text>
      <text x="876" y="268" text-anchor="middle" fill="#34D3E8">extends</text>
    </g>
    <g font-size="11">
      <text x="1056" y="282" text-anchor="start" fill="#7C8AA0">software-security</text>
      <text x="1066" y="354" text-anchor="start" fill="#7C8AA0">scientific</text>
      <text x="1056" y="426" text-anchor="start" fill="#7C8AA0">regenerative-agriculture</text>
      <text x="1000" y="202" text-anchor="end" fill="#F5B642">+new</text>
    </g>
  </g>

  <!-- ===== Footer locators ===== -->
  <text x="84" y="572" font-family="Menlo, 'SF Mono', 'JetBrains Mono', monospace"
        font-size="15" fill="#7C8AA0" letter-spacing="0.01em">modeled-information-format/ontologies</text>
  <text x="1192" y="572" text-anchor="end" font-family="Menlo, 'SF Mono', 'JetBrains Mono', monospace"
        font-size="15" fill="#7C8AA0" letter-spacing="0.02em">mif-spec.dev</text>
</svg>
