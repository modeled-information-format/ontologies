---
name: Release

# Attested delivery pipeline — language-agnostic template.
#
# Flow: build tarball → attest-build-provenance → generate + attest CycloneDX SBOM
#       → fail-closed verify (gh attestation verify) → tag-gated publish.
#
# The invariant: an artifact reaches consumers ONLY if it is byte-identical to
# what was validated, carries SLSA provenance + SBOM attestations that re-verify
# at every hop, and publication is fail-closed on that verification. A tag
# publishes nothing unattested.
#
# Dry-run: workflow_dispatch from any branch exercises the full
# build → attest → verify chain; the publish job is tag-gated and skipped.
#
# Adapt the "build" job's "Build artifact" step to your toolchain.
# Everything else — attestation, verification, publish — is toolchain-agnostic.

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Meta: resolve artifact name + version from the tag or a dev default.
  # ---------------------------------------------------------------------------
  meta:
    name: Resolve Metadata
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        # v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Resolve artifact name and version
        id: meta
        run: |
          set -euo pipefail
          # NAME — derive from the repo name; consumers can override this.
          NAME="${GITHUB_REPOSITORY##*/}"
          # VERSION — tag (strip leading "v") or dev fallback.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${NAME} ${VERSION}"

  # ---------------------------------------------------------------------------
  # Build: produce a deterministic tarball from the source tree.
  # Replace the "Build artifact" step with your toolchain's build command.
  # The contract: place output file(s) in dist/ — everything else is automatic.
  # ---------------------------------------------------------------------------
  build:
    name: Build Artifact
    needs: [meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write      # required for OIDC → Sigstore signing
      attestations: write  # required to write attestation records
    outputs:
      subject-name: ${{ steps.subject.outputs.name }}
      subject-digest: ${{ steps.subject.outputs.digest }}

    steps:
      - name: Checkout repository
        # v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      # -----------------------------------------------------------------------
      # ADAPT THIS STEP for your toolchain.
      # Examples:
      #   Go:    go build -o dist/${NAME}-${VERSION}-linux-amd64 ./cmd/...
      #   Rust:  cargo build --release --locked && cp target/release/... dist/
      #   Node:  npm ci && npm run build && tar -czf dist/... dist-src/
      #   Any:   <your build command> — output MUST land under dist/
      # -----------------------------------------------------------------------
      - name: Build artifact
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # Language-agnostic default: pack a reproducible source tarball.
          # Replace this block with your toolchain's build command.
          git archive \
            --format=tar.gz \
            --prefix="${NAME}-${VERSION}/" \
            -o "dist/${NAME}-${VERSION}.tar.gz" \
            "${GITHUB_SHA}"
          echo "Built: dist/${NAME}-${VERSION}.tar.gz"
          sha256sum dist/*

      # Expose the built artifact's name + digest as the subject the seam-signed
      # gate verdicts (e.g. SAST) bind to.
      - name: Record subject (name + digest) for the attestation seam
        id: subject
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          FILE="${NAME}-${VERSION}.tar.gz"
          DIGEST=$(sha256sum "dist/${FILE}" | cut -d' ' -f1)
          echo "name=${FILE}" >> "$GITHUB_OUTPUT"
          echo "digest=sha256:${DIGEST}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Attest SLSA build provenance (GitHub-native, no key material required).
      # This binds the artifact bytes to the workflow run that produced them.
      # -----------------------------------------------------------------------
      - name: Attest build provenance
        # v2.4.0
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be
        with:
          subject-path: dist/*

      - name: Upload build artifact
        # v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-dist
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # SBOM: generate a CycloneDX SBOM over the repo and attest it, binding the
  # SBOM document to the built artifacts.
  # ---------------------------------------------------------------------------
  sbom:
    name: SBOM (generate + attest)
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        # v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Download build artifacts
        # v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-dist
          path: dist

      # CycloneDX SBOM via the central, SHA-pinned anchore/sbom-action — the same
      # action sign-and-attest.yml and the other repos already use. Syft
      # acquisition is centralized and integrity-pinned (the action's commit
      # SHA), not reinvented here. Requires the org allow-list to permit
      # anchore/sbom-action (owner action; already permitted — rust-template and
      # both Pages deployers use this exact SHA).
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false
          echo "Generated SBOM: ${NAME}-${VERSION}-sbom.cdx.json"

      # Attest SBOM: binds every artifact in dist/ to the SBOM document.
      - name: Attest SBOM
        # v2.3.0
        uses: actions/attest-sbom@bd218ad0dbcb3e146bd073d1d9c6d78e08aa8a0b
        with:
          subject-path: dist/*
          sbom-path: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom.cdx.json

      - name: Upload SBOM artifact
        # v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom
          path: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom.cdx.json
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # SAST gate + attestation seam — CodeQL verdict signed over the release
  # subject (the built artifact), then fail-closed verified before publish.
  # SAST analyzes the exact source that ships, so its verdict travels with the
  # release like provenance and the SBOM. `languages: actions` scans the repo's
  # own workflows (no toolchain, applies to any repo); add your source
  # language(s) (e.g. go, python, java-kotlin) when you adapt the build step.
  # ---------------------------------------------------------------------------
  gate-sast:
    name: Gate — SAST (CodeQL)
    needs: [meta]
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read   # reusable's analyze job declares it (CodeQL pkg resolution)
    # modeled-information-format/.github main @ 789b6ba (re-pinned 2026-06-30)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-sast-codeql.yml@789b6baf9a1451f406ff507aabb5c5be8a9d48a4
    with:
      languages: actions
      build-mode: none

  attest-sast:
    name: Attest — SAST
    needs: [meta, build, gate-sast]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # modeled-information-format/.github main @ 789b6ba (re-pinned 2026-06-30)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@5c856f8118976bfd3bb64a8911f69dc9b00b4cad
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/sast/v1
      predicate-artifact: ${{ needs.gate-sast.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-sast.outputs.sarif-filename }}

  # ---------------------------------------------------------------------------
  # SCA (OSV) gate + attestation seam — dependency verdict signed over the
  # release subject, fail-closed verified before publish.
  # ---------------------------------------------------------------------------
  gate-sca:
    name: Gate — SCA (OSV)
    needs: [meta]
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write   # reusable's (skipped) dependency-review job declares it
    # modeled-information-format/.github main @ 789b6ba (re-pinned 2026-06-30)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-sca-osv.yml@789b6baf9a1451f406ff507aabb5c5be8a9d48a4
    with:
      fail-on-severity: high

  attest-sca:
    name: Attest — SCA
    needs: [meta, build, gate-sca]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # modeled-information-format/.github main @ 789b6ba (re-pinned 2026-06-30)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@5c856f8118976bfd3bb64a8911f69dc9b00b4cad
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/sca/v1
      predicate-artifact: ${{ needs.gate-sca.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-sca.outputs.sarif-filename }}

  # ---------------------------------------------------------------------------
  # IaC + license (Trivy filesystem) gate + attestation seam.
  # ---------------------------------------------------------------------------
  gate-trivy:
    name: Gate — Trivy (IaC/license)
    needs: [meta]
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read   # reusable's (skipped) image job declares it
    # modeled-information-format/.github main @ 789b6ba (re-pinned 2026-06-30)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-trivy.yml@789b6baf9a1451f406ff507aabb5c5be8a9d48a4
    with:
      scan-iac: true

  attest-iac-license:
    name: Attest — IaC/license
    needs: [meta, build, gate-trivy]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # modeled-information-format/.github main @ 789b6ba (re-pinned 2026-06-30)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@5c856f8118976bfd3bb64a8911f69dc9b00b4cad
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/iac-license/v1
      predicate-artifact: ${{ needs.gate-trivy.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-trivy.outputs.sarif-filename }}

  # ---------------------------------------------------------------------------
  # VEX — OpenVEX vulnerability disposition, self-signed by reusable-vex.yml
  # (its own signer identity) bound to the release subject. Maintain the
  # disposition document in .vex/openvex.json.
  # ---------------------------------------------------------------------------
  vex:
    name: Gate — VEX (OpenVEX)
    needs: [meta, build]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # modeled-information-format/.github main @ 789b6ba (re-pinned 2026-06-30)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-vex.yml@789b6baf9a1451f406ff507aabb5c5be8a9d48a4
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      vex-path: .vex/openvex.json

  # ---------------------------------------------------------------------------
  # Verify: FAIL-CLOSED attestation verification.
  # This job MUST succeed before publish. It verifies:
  #   1. SLSA build provenance on every artifact.
  #   2. SBOM attestation on every artifact.
  #   3. SAST verdict (seam-signed) on the release subject.
  # If any check fails the workflow halts and nothing is published.
  # ---------------------------------------------------------------------------
  verify:
    name: Verify Attestations (fail-closed)
    needs: [meta, build, sbom, attest-sast, attest-sca, attest-iac-license, vex]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read

    steps:
      - name: Download all artifacts
        # v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-*
          path: all-artifacts
          merge-multiple: true

      - name: Fail-closed attestation verification
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          SEAM: modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml
          VEX_SIGNER: modeled-information-format/.github/.github/workflows/reusable-vex.yml
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Collect the built artifacts (exclude the SBOM document itself).
          artifacts=()
          for f in all-artifacts/*; do
            case "$f" in
              *-sbom.cdx.json) continue ;;  # SBOM doc is not a verification subject here
              *) artifacts+=("$f") ;;
            esac
          done

          if [ "${#artifacts[@]}" -eq 0 ]; then
            echo "::error::No artifacts found to verify"
            exit 1
          fi

          echo "Verifying ${#artifacts[@]} artifact(s)..."

          for artifact in "${artifacts[@]}"; do
            echo ""
            echo "=== Verifying: ${artifact} ==="

            # 1. SLSA build provenance — must exist and be signed by THIS repo's workflow.
            echo "  [1/2] Build provenance..."
            gh attestation verify "${artifact}" \
              --repo "${GITHUB_REPOSITORY}" \
              --predicate-type "https://slsa.dev/provenance/v1"
            echo "  PASS: build provenance"

            # 2. SBOM attestation — artifact must be bound to an SBOM.
            echo "  [2/3] SBOM attestation..."
            gh attestation verify "${artifact}" \
              --repo "${GITHUB_REPOSITORY}" \
              --predicate-type "https://cyclonedx.org/bom"
            echo "  PASS: SBOM attestation"

            # 3. Seam-signed gate verdicts (SLSA L3: signer is the central
            # reusable-attest-scan.yml, so --signer-workflow is required).
            for pt in sast sca iac-license; do
              echo "  [3/4] Gate verdict (${pt}, seam)..."
              gh attestation verify "${artifact}" \
                --owner "${OWNER}" \
                --signer-workflow "${SEAM}" \
                --predicate-type "https://modeled-information-format.github.io/attestations/${pt}/v1"
              echo "  PASS: ${pt} verdict"
            done

            # 4. VEX disposition — self-signed by reusable-vex.yml (its own
            # signer identity, NOT the seam), one signer per command.
            echo "  [4/4] VEX disposition (OpenVEX)..."
            gh attestation verify "${artifact}" \
              --owner "${OWNER}" \
              --signer-workflow "${VEX_SIGNER}" \
              --predicate-type "https://openvex.dev/ns/v0.2.0"
            echo "  PASS: VEX disposition"
          done

          echo ""
          echo "All attestations verified. Proceeding to publish."

  # ---------------------------------------------------------------------------
  # Publish: create a GitHub Release.
  # GATED: requires verify to succeed AND the ref must be a tag.
  # Nothing is published on workflow_dispatch (dry-run) or non-tag pushes.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [meta, verify]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create the GitHub Release

    steps:
      - name: Download all artifacts
        # v4.3.0
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          cd dist
          sha256sum -- * > "${NAME}-${VERSION}-checksums.txt"
          echo "Checksums:"
          cat "${NAME}-${VERSION}-checksums.txt"

      # Create the release with the GitHub CLI (pre-installed on the runner)
      # rather than a third-party action, keeping every step GitHub-native so
      # the org Actions allow-list cannot block publication.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          PRERELEASE=()
          case "${GITHUB_REF_NAME}" in *-*) PRERELEASE=(--prerelease) ;; esac
          # --repo avoids needing a local git checkout (gh infers the repo
          # from $GITHUB_REPOSITORY instead of a .git remote).
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Release ${VERSION}" \
            --generate-notes \
            "${PRERELEASE[@]}"
