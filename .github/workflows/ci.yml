---
name: CI

# Continuous integration: runs on every push and pull_request to main.
# Includes a mandatory pin-check job that fails if any workflow uses a
# non-SHA action reference — enforcing the supply-chain security invariant
# that every action must be pinned to a full 40-char commit SHA.

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Pin check — every `uses:` in this repo MUST be pinned to a full 40-char
  # commit SHA; tag/branch refs are rejected. Per CLAUDE.md §2/§3 (consume the
  # central reusables, never reinvent them) this is a THIN CALLER of the org's
  # central `pin-check.yml` reusable, not an inline re-implementation. The
  # reusable is itself pinned by the central `.github` repo's commit SHA.
  # ---------------------------------------------------------------------------
  # modeled-information-format/.github main @ 789b6ba (re-pinned 2026-06-30)
  pin-check:
    permissions:
      contents: read
    uses: >-
      modeled-information-format/.github/.github/workflows/pin-check.yml@5c856f8118976bfd3bb64a8911f69dc9b00b4cad

  # ---------------------------------------------------------------------------
  # Lint: basic shell/YAML linting placeholder.
  # Replace or extend with your project's linter.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check for TODO/FIXME markers (informational)
        run: |
          set -euo pipefail
          count=$(grep -rn "TODO\|FIXME\|HACK\|XXX" \
            --include="*.yml" --include="*.yaml" \
            --include="*.sh" --include="*.md" \
            . 2>/dev/null | wc -l || true)
          echo "Found ${count} TODO/FIXME/HACK/XXX marker(s) (informational only)."

  # ---------------------------------------------------------------------------
  # Validate: verify workflow YAML is well-formed.
  # Requires actionlint to be installed, or skips gracefully if absent.
  # ---------------------------------------------------------------------------
  # Thin caller of the central reusable-actionlint — the verified, pinned
  # actionlint download lives in the reusable (consume the central reusables,
  # never reinvent them). Pinned by the .github repo's commit SHA.
  # modeled-information-format/.github @ 789b6ba (re-pinned 2026-06-30)
  validate-workflows:
    permissions:
      contents: read
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-actionlint.yml@1b416b97ff3ded8a49ae6873cc350eb1efb389bf

  # ---------------------------------------------------------------------------
  # Validate ontology content: schema conformance + subtype_of integrity +
  # namespace consistency across ontologies/*.ontology.yaml. Closes the gap
  # left when ADR-018/ADR-019 moved ontology content here without the
  # validation that used to gate it in MIF following along (issue #51).
  #
  # Runs unconditionally on every push/PR to main, matching this workflow's
  # other jobs (lint, validate-workflows) rather than adding a path filter
  # this file doesn't otherwise use anywhere.
  #
  # ontology.schema.json is fetched fresh from its canonical, resolvable,
  # unversioned $id (https://mif-spec.dev/schema/ontology/ontology.schema.json,
  # ADR-007) rather than vendored locally -- no staleness to keep in sync.
  # Schema validation itself uses the ajv/ajv-formats libraries directly via
  # scripts/ajv-validate.mjs, not the ajv-cli package (see that script's
  # docstring: ajv-cli@5.0.0 carries an unpatched high-severity transitive
  # vulnerability, GHSA-8gh8-hqwg-xf34, in a dependency this repo's use case
  # never touches).
  # ---------------------------------------------------------------------------
  validate-ontologies:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        # v7.0.0
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Python
        # v6.3.0
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: '3.12'

      - name: Setup Node.js
        # v6.4.0
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          pip install --require-hashes -r scripts/requirements.txt
          npm ci

      - name: Fetch ontology.schema.json (canonical, unversioned $id)
        run: |
          curl -fsSL -o /tmp/ontology.schema.json \
            https://mif-spec.dev/schema/ontology/ontology.schema.json

      - name: Run regression tests
        run: python3 scripts/tests/test_ontology_validation.py -v

      - name: Validate ontology files (schema + subtype_of integrity)
        env:
          ONTOLOGY_SCHEMA_PATH: /tmp/ontology.schema.json
        run: python3 scripts/validate-ontologies.py

      - name: Validate namespace consistency
        run: python3 scripts/validate-namespaces.py
