---
name: DAST (attested)

# Concrete DAST example — the runtime counterpart of the build-time gates in
# release.yml. It points the central ZAP reusable at a RUNNING target, signs the
# verdict as a digest-bound attestation, and fail-closed verifies it:
#
#   subject (provenance) → gate-dast (ZAP) → attest-dast (seam, dast/v1) → verify
#
# DAST exercises a running service, so the caller must STAND UP the target and
# pass its URL (reusable-zap.yml's contract). This example defaults to the org's
# own deployed site — a real, running, org-owned endpoint that is safe to scan;
# adopters point `target` at their deployed preview/staging instead.
#
# `fail-action: false` keeps the gate advisory: the verdict is signed and
# attested regardless of findings (signed ≠ passed — verifying policy reads the
# predicate body), exactly like the SARIF gates.
#
# OWNER ALLOW-LIST: reusable-zap.yml pulls `zaproxy/action-full-scan`, a
# third-party action. The org Actions allow-list must permit that ONE action —
# `zaproxy/action-full-scan@*` (or the exact pinned SHA) — NOT a `zaproxy/*`
# owner wildcard, or this workflow startup-fails. The workflow pin stays
# SHA-exact (pin-check enforces it); the allow-list just permits the action.

"on":
  workflow_dispatch:
    inputs:
      target:
        description: "URL of the running target to scan"
        required: false
        default: "https://modeled-information-format.github.io"
        type: string

permissions:
  contents: read

jobs:
  meta:
    name: Resolve Metadata
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        # v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Resolve artifact name and version
        id: meta
        run: |
          set -euo pipefail
          echo "name=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "version=0.0.0-dast" >> "$GITHUB_OUTPUT"

  # The subject the DAST verdict binds to: a provenance-attested source snapshot
  # representing the build under test.
  subject:
    name: Subject Snapshot
    needs: [meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      subject-name: ${{ steps.pack.outputs.name }}
      subject-digest: ${{ steps.pack.outputs.digest }}
    steps:
      - name: Checkout repository
        # v4.2.2
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - name: Pack subject snapshot
        id: pack
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          FILE="${NAME}-${VERSION}.tar.gz"
          git archive --format=tar.gz --prefix="${NAME}-${VERSION}/" \
            -o "dist/${FILE}" "${GITHUB_SHA}"
          DIGEST=$(sha256sum "dist/${FILE}" | cut -d' ' -f1)
          echo "name=${FILE}" >> "$GITHUB_OUTPUT"
          echo "digest=sha256:${DIGEST}" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        # v2.4.0
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373
        with:
          subject-path: dist/${{ steps.pack.outputs.name }}
      - name: Upload subject artifact
        # v4.6.2
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-subject
          path: dist/${{ steps.pack.outputs.name }}
          if-no-files-found: error

  # DAST gate — thin caller of the central ZAP reusable against the running
  # target. Emits the JSON report as evidence for the seam.
  gate-dast:
    name: Gate — DAST (ZAP)
    needs: [meta]
    permissions:
      contents: read
    # modeled-information-format/.github main @ 789b6ba (re-pinned 2026-06-30)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-zap.yml@05b13774259a17140419556a45a48ba6a3e36e0c
    with:
      target: ${{ inputs.target }}
      fail-action: false

  # Seam — sign the DAST verdict bound to the subject digest as dast/v1.
  attest-dast:
    name: Attest — DAST
    needs: [meta, subject, gate-dast]
    permissions:
      id-token: write
      attestations: write
      contents: read
    # modeled-information-format/.github main @ 789b6ba (re-pinned 2026-06-30)
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@05b13774259a17140419556a45a48ba6a3e36e0c
    with:
      subject-name: ${{ needs.subject.outputs.subject-name }}
      subject-digest: ${{ needs.subject.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/dast/v1
      predicate-artifact: ${{ needs.gate-dast.outputs.report-artifact }}
      predicate-filename: ${{ needs.gate-dast.outputs.report-filename }}

  # Fail-closed: an unverifiable DAST verdict does not pass.
  verify:
    name: Verify Attestations (fail-closed)
    needs: [meta, subject, attest-dast]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - name: Download subject artifact
        # v4.3.0
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-subject
          path: subject
      - name: Fail-closed attestation verification
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          SEAM: modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml
          SUBJECT_NAME: ${{ needs.subject.outputs.subject-name }}
        run: |
          set -euo pipefail
          SUBJECT="subject/${SUBJECT_NAME}"
          echo "Verifying provenance: ${SUBJECT}"
          gh attestation verify "${SUBJECT}" \
            --repo "${GITHUB_REPOSITORY}" \
            --predicate-type https://slsa.dev/provenance/v1
          echo "Verifying DAST verdict (seam): ${SUBJECT}"
          gh attestation verify "${SUBJECT}" \
            --owner "${OWNER}" \
            --signer-workflow "${SEAM}" \
            --predicate-type https://modeled-information-format.github.io/attestations/dast/v1
          echo "Verified: SLSA provenance + DAST verdict (dast/v1)"
